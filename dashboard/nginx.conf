server {
    listen 9080;
    server_name _;

    root /opt/gridlib/dashboard;
    index index.html;

    # Prevent caching of status.json so the browser always gets fresh data
    location = /status.json {
        add_header Cache-Control "no-store";
        add_header Pragma "no-cache";
        etag off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
